<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- External Libraries for Markdown & Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <button class="btn new-chat-btn" id="new-chat-btn">
                <i class="ph ph-plus"></i>
                <span>New Chat</span>
            </button>
            <div class="chat-history" id="chat-history">
                <!-- Chat items injected via JS -->
            </div>
            <div class="sidebar-footer">
                <button class="settings-btn" id="settings-open-btn">
                    <i class="ph ph-gear"></i>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <button class="icon-btn mobile-menu-btn" id="menu-btn">
                    <i class="ph ph-list"></i>
                </button>
                <h1 class="chat-title" id="current-chat-title">New Chat</h1>
                <div class="header-actions"></div>
            </header>

            <div class="chat-container" id="chat-container">
                <!-- Messages injected via JS -->
                <div class="welcome-screen" id="welcome-screen">
                    <h2>How can I help you today?</h2>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Message AI..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn" disabled>
                        <i class="ph ph-paper-plane-right"></i>
                    </button>
                </div>
                <div class="disclaimer">AI can make mistakes. Verify important information.</div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="icon-btn" id="settings-close-btn"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="api-url">API Base URL</label>
                    <input type="text" id="api-url" placeholder="https://api.openai.com/v1">
                </div>
                <div class="form-group">
                    <label for="api-key">API Key</label>
                    <input type="password" id="api-key" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label for="api-model">Model Name</label>
                    <input type="text" id="api-model" placeholder="gpt-4o">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="api-stream">
                    <label for="api-stream">Stream Response</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn save-btn" id="settings-save-btn">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="assets/js/script.js"></script>
</body>
</html>
